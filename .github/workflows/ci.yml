name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --workspace

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - run: cargo clippy --target wasm32-unknown-unknown -- -D warnings
      - run: wasm-pack build core --target web

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: docker compose up -d --wait minio
      - run: docker compose run --rm createbucket
      - run: cargo test -p bare-bucket-core --test s3_integration -- --nocapture
        env:
          BARE_BUCKET_IT: "1"
          BARE_BUCKET_IT_ENDPOINT: http://127.0.0.1:9000
          BARE_BUCKET_IT_REGION: us-east-1
          BARE_BUCKET_IT_BUCKET: bare-bucket-it
          BARE_BUCKET_IT_ACCESS_KEY: baretest
          BARE_BUCKET_IT_SECRET_KEY: baretest123
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - run: wasm-pack build core --target web
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - run: |
          printf 'ci-seed' > /tmp/seed.txt
          docker compose run --rm -v /tmp/seed.txt:/seed.txt:z --entrypoint sh createbucket -c "mc alias set local http://minio:9000 baretest baretest123 && mc cp /seed.txt local/bare-bucket-it/ci-seed/seed.txt"
      - run: node scripts/wasm-smoke.mjs

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - run: wasm-pack build core --target web
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run check
        working-directory: web
      - run: npm test -- --run
        working-directory: web
      - run: npm run build
        working-directory: web
